# =========================
#  RATE LIMIT GLOBAL
# =========================
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# =========================
# 🌐 HTTP → HTTPS
# =========================
server {
    listen 80;
    server_name api.tabaratomano.com.br;

    # Certbot (SSL)
    location /.well-known/acme-challenge/ {
        root /var/lib/letsencrypt;
    }

    return 301 https://$host$request_uri;
}

# =========================
#  HTTPS (PRODUÇÃO)
# =========================
server {
    listen 443 ssl;
    server_name api.tabaratomano.com.br;

    # =========================
    #  SSL
    # =========================
    ssl_certificate /etc/letsencrypt/live/api.tabaratomano.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.tabaratomano.com.br/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # =========================
    # SEGURANÇA
    # =========================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # =========================
    #  PERFORMANCE
    # =========================
    gzip on;
    gzip_types text/plain application/json text/css application/javascript;
    gzip_min_length 1000;

    # =========================
    #  API
    # =========================
    location / {

        #  Rate limit
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://api:3000;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # =========================
    #  HEALTH CHECK 
    # =========================
    location /health {
        proxy_pass http://api:3000/health;
    }
}