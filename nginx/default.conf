# REDIRECIONA HTTP → HTTPS
server {
    listen 80;
    server_name api.tabaratomano.com.br;

    # ROTA DO CERTBOT (ESSENCIAL)
    location /.well-known/acme-challenge/ {
        root /var/lib/letsencrypt;
    }

    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    server_name api.tabaratomano.com.br;

    ssl_certificate /etc/letsencrypt/live/api.tabaratomano.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.tabaratomano.com.br/privkey.pem;

    location / {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}