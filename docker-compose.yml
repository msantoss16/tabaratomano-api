version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: tabaratomano-db
    restart: always
    env_file:
      - .env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d tabaratomano"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tabaratomano-redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - backend
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: tabaratomano-api
    restart: always
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - SCRAPER_URL=http://scraper:3001
    ports:
      - "3000:3000"
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:3000/",
        ]
      interval: 10s
      timeout: 300s
      retries: 5

  scraper:
    build:
      context: .
      dockerfile: apps/scraper/Dockerfile
    container_name: tabaratomano-scraper
    restart: always
    env_file:
      - .env
    expose:
      - "3001"
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./scraper-errors:/app/scraper-errors

  whatsapp:
    build:
      context: .
      dockerfile: apps/whatsapp/Dockerfile
    container_name: tabaratomano-whatsapp
    restart: always
    env_file:
      - .env
    environment:
      - API_URL=http://api:3000
      - REDIS_URL=redis://redis:6379
    networks:
      - backend
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - baileys-auth:/app/apps/whatsapp/auth_info_baileys

  x:
    build:
      context: .
      dockerfile: apps/x/Dockerfile
    container_name: tabaratomano-x
    restart: always
    env_file:
      - .env
    environment:
      - API_URL=http://api:3000
      - REDIS_URL=redis://redis:6379
    networks:
      - backend
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
  baileys-auth:

networks:
  backend:
    driver: bridge
